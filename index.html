<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>אגרובוט</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0f07;
  --surf:#111a0d;
  --surf2:#192413;
  --brd:#2a3d1e;
  --tx:#e8f0e0;
  --txm:#7a9a68;
  --txd:#b8d4a0;
  --grn:#4a9e2f;
  --grn2:#2d6b1a;
  --gold:#c8960a;
  --gold2:#8a6200;
  --red:#d03030;
  --blu:#3a7a9a;
  --radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--tx);height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* ── HEADER ── */
header{background:var(--surf);border-bottom:1px solid var(--brd);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--grn),var(--gold));display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.app-name{font-size:18px;font-weight:900;color:var(--tx);flex:1}
.app-sub{font-size:10px;color:var(--txm)}
.hbtn{background:var(--surf2);border:1px solid var(--brd);color:var(--txm);width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ── CHAT AREA ── */
#chat-wrap{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}

/* ── MESSAGES ── */
.msg{display:flex;gap:8px;align-items:flex-end;max-width:88%}
.msg.user{flex-direction:row-reverse;align-self:flex-end}
.msg.bot{align-self:flex-start}
.msg-bubble{padding:10px 14px;border-radius:var(--radius);font-size:13px;line-height:1.65;position:relative}
.msg.user .msg-bubble{background:linear-gradient(135deg,var(--grn2),var(--grn));color:#fff;border-bottom-left-radius:4px}
.msg.bot .msg-bubble{background:var(--surf);border:1px solid var(--brd);color:var(--tx);border-bottom-right-radius:4px}
.msg-time{font-size:9px;color:var(--txm);padding:0 4px;flex-shrink:0}
.bot-avatar{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--grn),var(--gold));display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.msg-img{max-width:200px;border-radius:10px;margin-top:6px;display:block;cursor:zoom-in}
.msg-img:active{transform:scale(1.02)}

/* ── TYPING INDICATOR ── */
.typing{display:flex;gap:4px;align-items:center;padding:12px 14px}
.typing span{width:7px;height:7px;background:var(--grn);border-radius:50%;animation:bounce .8s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}}

/* ── INPUT AREA ── */
#input-area{background:var(--surf);border-top:1px solid var(--brd);padding:10px 12px;flex-shrink:0}
.img-preview-wrap{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.img-thumb{position:relative;width:56px;height:56px;border-radius:8px;overflow:hidden;flex-shrink:0}
.img-thumb img{width:100%;height:100%;object-fit:cover}
.img-thumb-del{position:absolute;top:2px;right:2px;width:16px;height:16px;background:rgba(0,0,0,.7);border-radius:50%;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;border:none}
.input-row{display:flex;gap:8px;align-items:flex-end}
#msg-inp{flex:1;background:var(--surf2);border:1px solid var(--brd);border-radius:12px;padding:10px 12px;color:var(--tx);font-size:14px;font-family:'Heebo',sans-serif;resize:none;min-height:42px;max-height:120px;outline:none;direction:rtl}
#msg-inp:focus{border-color:var(--grn)}
#msg-inp::placeholder{color:var(--txm)}
.send-btn{background:linear-gradient(135deg,var(--grn2),var(--grn));border:none;color:#fff;width:42px;height:42px;border-radius:12px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .2s}
.send-btn:disabled{opacity:.4}
.attach-btn{background:var(--surf2);border:1px solid var(--brd);color:var(--txm);width:42px;height:42px;border-radius:12px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ── QUICK TOPICS ── */
.quick-chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;flex-shrink:0}
.quick-chips::-webkit-scrollbar{display:none}
.chip{background:var(--surf2);border:1px solid var(--brd);color:var(--txm);padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:'Heebo',sans-serif;flex-shrink:0}
.chip:active{background:var(--grn2);border-color:var(--grn);color:#fff}

/* ── MEMORY PANEL ── */
#mem-panel{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:none;align-items:flex-end}
#mem-panel.open{display:flex}
.mem-sheet{background:var(--surf);border-radius:16px 16px 0 0;width:100%;max-height:80vh;overflow-y:auto;padding:16px}
.mem-item{background:var(--surf2);border:1px solid var(--brd);border-radius:10px;padding:10px 12px;margin-bottom:6px;font-size:12px;color:var(--txd);cursor:pointer}
.mem-item-title{font-size:11px;color:var(--txm);margin-bottom:3px}
.mem-item:active{border-color:var(--grn)}

/* ── LOGIN ── */
#login-screen{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:var(--surf);border:1px solid var(--brd);border-radius:20px;padding:28px 24px;width:100%;max-width:360px;text-align:center}
.login-logo{font-size:48px;margin-bottom:8px}
.login-title{font-size:24px;font-weight:900;color:var(--tx);margin-bottom:4px}
.login-sub{font-size:12px;color:var(--txm);margin-bottom:24px}
.login-inp{width:100%;background:var(--surf2);border:1px solid var(--brd);border-radius:10px;padding:12px 14px;color:var(--tx);font-size:14px;font-family:'Heebo',sans-serif;margin-bottom:10px;outline:none;direction:ltr}
.login-inp:focus{border-color:var(--grn)}
.login-btn{width:100%;background:linear-gradient(135deg,var(--grn2),var(--grn));border:none;color:#fff;padding:13px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Heebo',sans-serif}

/* ── TOAST ── */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--surf);border:1px solid var(--brd);color:var(--tx);padding:10px 18px;border-radius:20px;font-size:12px;font-weight:700;z-index:1000;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}

/* ── SCROLLBAR ── */
#chat-wrap::-webkit-scrollbar{width:3px}
#chat-wrap::-webkit-scrollbar-thumb{background:var(--brd);border-radius:2px}

/* ── MARKDOWN ── */
.msg-bubble b,.msg-bubble strong{color:var(--gold);font-weight:700}
.msg-bubble ul{padding-right:16px;margin:6px 0}
.msg-bubble li{margin-bottom:3px}
.msg-bubble code{background:rgba(0,0,0,.3);border-radius:4px;padding:1px 5px;font-size:11px;font-family:monospace}
.msg-bubble a{color:var(--grn);text-decoration:none}

/* ── WELCOME ── */
.welcome-card{background:var(--surf2);border:1px solid var(--brd);border-radius:var(--radius);padding:16px;text-align:center;margin-bottom:8px}
.welcome-card h2{font-size:15px;font-weight:900;color:var(--gold);margin-bottom:6px}
.welcome-card p{font-size:12px;color:var(--txm);line-height:1.6}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🌿</div>
    <div class="login-title">אגרובוט</div>
    <div class="login-sub">יועץ הגידול החכם שלך</div>
    <input class="login-inp" type="email" id="login-email" placeholder="your@email.com">
    <input class="login-inp" type="password" id="login-pass" placeholder="סיסמה" style="margin-bottom:16px">
    <button class="login-btn" onclick="doLogin()">כניסה</button>
    <div style="font-size:11px;color:var(--txm);margin-top:12px;cursor:pointer" onclick="doSignup()">אין חשבון? הרשמה</div>
    <div id="login-err" style="font-size:11px;color:var(--red);margin-top:8px"></div>
  </div>
</div>

<!-- HEADER -->
<header>
  <div class="logo">🌿</div>
  <div>
    <div class="app-name">אגרובוט</div>
    <div class="app-sub" id="user-label">יועץ גידול חכם</div>
  </div>
  <div style="flex:1"></div>
  <button class="hbtn" onclick="openMem()" title="זיכרון">🧠</button>
  <button class="hbtn" onclick="clearChat()" title="שיחה חדשה">✨</button>
  <button class="hbtn" onclick="doLogout()" title="יציאה">🚪</button>
</header>

<!-- CHAT -->
<div id="chat-wrap"></div>

<!-- INPUT -->
<div id="input-area">
  <div class="quick-chips" id="chips">
    <span class="chip" onclick="sendChip(this)">💧 דישון</span>
    <span class="chip" onclick="sendChip(this)">💡 תאורה</span>
    <span class="chip" onclick="sendChip(this)">🌡️ סביבה</span>
    <span class="chip" onclick="sendChip(this)">🦠 מחלות</span>
    <span class="chip" onclick="sendChip(this)">✂️ גיזום</span>
    <span class="chip" onclick="sendChip(this)">🌸 הפרחה</span>
    <span class="chip" onclick="sendChip(this)">🌾 קציר</span>
    <span class="chip" onclick="sendChip(this)">🫙 קיורינג</span>
  </div>
  <div id="img-preview" class="img-preview-wrap" style="display:none"></div>
  <div class="input-row">
    <button class="attach-btn" onclick="document.getElementById('file-inp').click()">📎</button>
    <input type="file" id="file-inp" accept="image/*,text/*,.csv,.xlsx,.pdf" multiple style="display:none" onchange="handleFiles(this.files)">
    <textarea id="msg-inp" placeholder="שאל שאלה על הגידול..." rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"
      oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMsg()">➤</button>
  </div>
</div>

<!-- MEMORY PANEL -->
<div id="mem-panel" onclick="if(event.target===this)closeMem()">
  <div class="mem-sheet">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="font-size:15px;font-weight:900">🧠 זיכרון</div>
      <button onclick="closeMem()" style="background:none;border:none;color:var(--txm);font-size:18px;cursor:pointer">✕</button>
    </div>
    <div id="mem-list"><div style="color:var(--txm);font-size:12px;text-align:center;padding:20px">טוען...</div></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── CONFIG ──
const SB_URL='https://epbzibkuwrtjaugezqcd.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVwYnppYmt1d3J0amF1Z2V6cWNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDM3NzMwMzgsImV4cCI6MjA1OTM0OTAzOH0.pQORQpyDmFmRFGhFNhWW6T5MR55L6-YISmSAZvxIXMY';

let _sb=null,_user=null;
let _history=[]; // {role,content,imgs?,time}
let _pendingImgs=[]; // {base64,type,name}

// ── SUPABASE INIT ──
async function initSB(){
  const{createClient}=await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm');
  _sb=createClient(SB_URL,SB_KEY);
  const{data:{session}}=await _sb.auth.getSession();
  if(session?.user) onLogin(session.user);
  else document.getElementById('login-screen').style.display='flex';
}

async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  const{data,error}=await _sb.auth.signInWithPassword({email,password:pass});
  if(error){document.getElementById('login-err').textContent=error.message;return;}
  onLogin(data.user);
}
async function doSignup(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  if(!email||!pass){document.getElementById('login-err').textContent='הכנס אימייל וסיסמה';return;}
  const{data,error}=await _sb.auth.signUp({email,password:pass});
  if(error){document.getElementById('login-err').textContent=error.message;return;}
  toast('✅ חשבון נוצר — בדוק מייל לאישור');
}
async function doLogout(){
  await _sb.auth.signOut();
  location.reload();
}

function onLogin(user){
  _user=user;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('user-label').textContent=user.email.split('@')[0];
  loadHistory();
  showWelcome();
}

function showWelcome(){
  const wrap=document.getElementById('chat-wrap');
  wrap.innerHTML=`<div class="welcome-card">
    <h2>🌿 שלום, אני אגרובוט</h2>
    <p>יועץ הגידול האישי שלך לקנאביס רפואי.<br>
    שאל אותי על דישון, תאורה, מחלות, סביבה וכל שאלה גידולית.<br>
    אני זוכר את כל השיחות שלנו.</p>
  </div>`;
}

// ── HISTORY / MEMORY ──
async function loadHistory(){
  if(!_sb||!_user) return;
  try{
    const{data}=await _sb.from('agrobot_messages')
      .select('*').eq('user_id',_user.id)
      .order('created_at',{ascending:true}).limit(100);
    if(data?.length){
      _history=data.map(m=>({
        role:m.role,content:m.content,
        imgs:m.images_b64||null,time:m.created_at
      }));
      renderHistory();
    }
  }catch(e){console.log('Load history:',e);}
}

function renderHistory(){
  const wrap=document.getElementById('chat-wrap');
  wrap.innerHTML='';
  _history.forEach(m=>appendMsg(m.role,m.content,m.imgs,m.time,false));
  wrap.scrollTop=wrap.scrollHeight;
}

async function saveMsg(role,content,images_b64=null){
  if(!_sb||!_user) return;
  try{
    await _sb.from('agrobot_messages').insert({
      user_id:_user.id,role,content,
      images_b64:images_b64||null,
      created_at:new Date().toISOString()
    });
  }catch(e){console.log('Save msg:',e);}
}

// ── FILE HANDLING ──
function handleFiles(files){
  Array.from(files).forEach(f=>{
    if(f.type.startsWith('image/')){
      const reader=new FileReader();
      reader.onload=e=>{
        const b64=e.target.result.split(',')[1];
        _pendingImgs.push({base64:b64,type:f.type,name:f.name});
        showImgPreview();
      };
      reader.readAsDataURL(f);
    } else {
      // טקסט/CSV
      const reader=new FileReader();
      reader.onload=e=>{
        const txt=e.target.result;
        document.getElementById('msg-inp').value+=`\n[קובץ: ${f.name}]\n${txt.substring(0,2000)}`;
      };
      reader.readAsText(f);
    }
  });
}

function showImgPreview(){
  const prev=document.getElementById('img-preview');
  prev.style.display='flex';
  prev.innerHTML=_pendingImgs.map((img,i)=>`
    <div class="img-thumb">
      <img src="data:${img.type};base64,${img.base64}">
      <button class="img-thumb-del" onclick="removeImg(${i})">✕</button>
    </div>`).join('');
}
function removeImg(i){
  _pendingImgs.splice(i,1);
  if(!_pendingImgs.length){document.getElementById('img-preview').style.display='none';}
  else showImgPreview();
}

// ── SEND MESSAGE ──
async function sendMsg(){
  const inp=document.getElementById('msg-inp');
  const text=inp.value.trim();
  if(!text&&!_pendingImgs.length) return;

  inp.value='';
  inp.style.height='';
  document.getElementById('send-btn').disabled=true;

  const imgs=[..._pendingImgs];
  _pendingImgs=[];
  document.getElementById('img-preview').style.display='none';
  document.getElementById('img-preview').innerHTML='';

  const time=new Date().toISOString();
  appendMsg('user',text||'(תמונה)',imgs.map(i=>i.base64),time);
  saveMsg('user',text,imgs.length?imgs.map(i=>({base64:i.base64,type:i.type})):null);
  _history.push({role:'user',content:text,imgs:imgs.length?imgs:null,time});

  showTyping();
  try{
    const reply=await callClaude(text,imgs);
    hideTyping();
    const rTime=new Date().toISOString();
    appendMsg('bot',reply,null,rTime);
    saveMsg('assistant',reply);
    _history.push({role:'assistant',content:reply,time:rTime});
  }catch(e){
    hideTyping();
    appendMsg('bot','⚠️ שגיאה בחיבור לסוכן: '+e.message,null,new Date().toISOString());
  }
  document.getElementById('send-btn').disabled=false;
}

function sendChip(el){
  document.getElementById('msg-inp').value=el.textContent.replace(/^[^\s]+\s/,'');
  document.getElementById('msg-inp').focus();
}

// ── CLAUDE API ──
async function callClaude(text,imgs){
  // השתמש במפתח Gemini הקיים מבסדר, או בקש חדש
  let gemKey=localStorage.getItem('cf_gemini_key')||localStorage.getItem('agro_gemini_key')||'';
  if(!gemKey){
    gemKey=prompt('הכנס Gemini API Key (חינמי מ-aistudio.google.com):');
    if(!gemKey) throw new Error('נדרש מפתח API');
    localStorage.setItem('agro_gemini_key',gemKey.trim());
    gemKey=gemKey.trim();
  }

  const SYSTEM=`אתה אגרובוט — יועץ מומחה לגידול קנאביס רפואי.
אתה מתמחה ב: דישון (NPK, pH, EC, מינונים), תאורה (PPFD, ספקטרום, מחזורי יום/לילה),
סביבה (טמפרטורה, לחות, CO2, אוורור), מחלות ומזיקים (זיהוי וטיפול),
שלבי גידול (השרשה, צימוח, הפרחה, ייבוש, קיורינג), אריזה ואיכות.
כשמעלים תמונה — תאר מה אתה רואה ותן ייעוץ ספציפי.
ענה תמיד בעברית. היה ספציפי, מעשי ומבוסס נתונים.
אם שואלים על מינון — תן טווח ספציפי. אל תגיד "זה תלוי" ללא הסבר.

היסטוריית שיחה אחרונה:
${_history.slice(-10).map(m=>`${m.role==='user'?'משתמש':'אגרובוט'}: ${m.content}`).join('\n')}`;

  const models=['gemini-2.5-flash','gemini-2.0-flash','gemini-1.5-flash'];
  for(const model of models){
    try{
      const url=`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${gemKey}`;
      const parts=[];
      if(imgs?.length){
        imgs.forEach(img=>{
          parts.push({inlineData:{mimeType:img.type||'image/jpeg',data:img.base64}});
        });
      }
      parts.push({text:text||'ייעץ לי'});

      const res=await fetch(url,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          systemInstruction:{parts:[{text:SYSTEM}]},
          contents:[{role:'user',parts}],
          generationConfig:{maxOutputTokens:8000,temperature:0.5}
        })
      });
      const data=await res.json();
      if(data.error){
        if(data.error.code===429||data.error.code===503) continue;
        throw new Error(data.error.message);
      }
      return data.candidates?.[0]?.content?.parts?.[0]?.text||'לא התקבלה תשובה';
    }catch(e){
      if(e.message.includes('API Key')||e.message.includes('API_KEY')) throw e;
      continue;
    }
  }
  throw new Error('כל המודלים לא זמינים — נסה שוב');
}

// ── UI HELPERS ──
function appendMsg(role,text,imgs,time,scroll=true){
  const wrap=document.getElementById('chat-wrap');
  const t=time?new Date(time).toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'}):'';
  const isBot=role==='bot'||role==='assistant';
  const div=document.createElement('div');
  div.className=`msg ${isBot?'bot':'user'}`;

  let imgHtml='';
  if(imgs?.length){
    imgs.forEach(img=>{
      const src=typeof img==='string'?`data:image/jpeg;base64,${img}`:
                img.base64?`data:${img.type||'image/jpeg'};base64,${img.base64}`:'';
      if(src) imgHtml+=`<img class="msg-img" src="${src}" onclick="zoomImg(this)">`;
    });
  }

  const formattedText=formatText(text||'');
  div.innerHTML=`
    ${isBot?'<div class="bot-avatar">🌿</div>':''}
    <div>
      <div class="msg-bubble">${formattedText}${imgHtml}</div>
      <div class="msg-time">${t}</div>
    </div>`;
  wrap.appendChild(div);
  if(scroll) wrap.scrollTop=wrap.scrollHeight;
}

function formatText(t){
  return t
    .replace(/\*\*(.*?)\*\*/g,'<b>$1</b>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/`(.*?)`/g,'<code>$1</code>')
    .replace(/\n/g,'<br>');
}

function zoomImg(img){
  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:999;display:flex;align-items:center;justify-content:center';
  ov.innerHTML=`<img src="${img.src}" style="max-width:95vw;max-height:90vh;border-radius:10px">`;
  ov.onclick=()=>ov.remove();
  document.body.appendChild(ov);
}

let _typingEl=null;
function showTyping(){
  const wrap=document.getElementById('chat-wrap');
  _typingEl=document.createElement('div');
  _typingEl.className='msg bot';
  _typingEl.innerHTML=`<div class="bot-avatar">🌿</div>
    <div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  wrap.appendChild(_typingEl);
  wrap.scrollTop=wrap.scrollHeight;
}
function hideTyping(){if(_typingEl){_typingEl.remove();_typingEl=null;}}

function autoResize(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,120)+'px';
}

function toast(msg,dur=3000){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

function clearChat(){
  if(!confirm('התחל שיחה חדשה? ההיסטוריה נשמרת בזיכרון.')) return;
  _history=[];
  showWelcome();
}

// ── MEMORY PANEL ──
async function openMem(){
  document.getElementById('mem-panel').classList.add('open');
  const list=document.getElementById('mem-list');
  list.innerHTML='<div style="color:var(--txm);font-size:12px;text-align:center;padding:10px">טוען...</div>';
  try{
    const{data}=await _sb.from('agrobot_messages')
      .select('*').eq('user_id',_user.id)
      .order('created_at',{ascending:false}).limit(50);
    if(!data?.length){list.innerHTML='<div style="color:var(--txm);font-size:12px;text-align:center;padding:20px">אין שיחות שמורות</div>';return;}
    // קבץ לפי נושאים
    list.innerHTML=data.filter(m=>m.role==='user').slice(0,20).map(m=>{
      const d=new Date(m.created_at).toLocaleDateString('he-IL',{day:'numeric',month:'short'});
      return`<div class="mem-item" onclick="loadMemMsg('${m.id}')">
        <div class="mem-item-title">${d}</div>
        ${(m.content||'').substring(0,80)}${(m.content||'').length>80?'...':''}
      </div>`;
    }).join('');
  }catch(e){list.innerHTML='<div style="color:var(--red);font-size:12px">שגיאה בטעינה</div>';}
}
function closeMem(){document.getElementById('mem-panel').classList.remove('open');}

async function loadMemMsg(id){
  closeMem();
  toast('טוען הקשר...');
  try{
    const{data}=await _sb.from('agrobot_messages')
      .select('*').eq('user_id',_user.id)
      .order('created_at',{ascending:true}).limit(200);
    if(data){
      _history=data.map(m=>({role:m.role,content:m.content,time:m.created_at}));
      renderHistory();
    }
  }catch(e){}
}

// ── INIT ──
initSB();
</script>
